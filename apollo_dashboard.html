<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#05080f;--s1:#0c1120;--s2:#111827;--s3:#1a2236;--bd:#1e2d4a;--tx:#e8edf5;--t2:#7b8ba8;--t3:#4a5874;--ac:#2563eb;--a2:#7c3aed;--g:#10b981;--y:#f59e0b;--r:#ef4444;--f:'DM Sans',system-ui,sans-serif;--fm:'JetBrains Mono',monospace}body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}.hd{background:var(--s1);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.logo{display:flex;align-items:center;gap:10px}.logo-i{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),var(--a2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff}.logo h1{font-size:16px;font-weight:700}.logo span{font-size:11px;color:var(--t2)}.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:var(--f);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}.btn:hover{border-color:var(--ac)}.btn-p{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}.btn-g{background:#065f46;border-color:#059669;color:#d1fae5}.tabs{display:flex;gap:1px;padding:6px 20px;background:var(--s1);border-bottom:1px solid var(--bd);overflow-x:auto}.tab{padding:9px 14px;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:transparent;border-radius:7px 7px 0 0;white-space:nowrap}.tab:hover{color:var(--tx);background:var(--s2)}.tab.on{color:#fff;background:var(--s2);box-shadow:inset 0 2px 0 var(--ac)}.fl{display:flex;flex-wrap:wrap;gap:8px;padding:10px 20px;background:var(--s1);border-bottom:1px solid var(--bd);align-items:flex-end}.fg{display:flex;flex-direction:column;gap:2px}.fg>label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);font-weight:700}.ms{position:relative;min-width:110px}.ms-b{padding:5px 22px 5px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:11px;cursor:pointer;width:100%;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ms-d{display:none;position:absolute;top:100%;left:0;min-width:100%;max-height:220px;overflow-y:auto;background:var(--s2);border:1px solid var(--bd);border-radius:6px;z-index:50;margin-top:2px;box-shadow:0 8px 24px rgba(0,0,0,.4)}.ms-d.open{display:block}.ms-d label{display:flex;align-items:center;gap:6px;padding:5px 10px;font-size:11px;cursor:pointer;white-space:nowrap}.ms-d label:hover{background:var(--s3)}.ms-d input{accent-color:var(--ac);width:14px;height:14px}.ms-a{display:flex;gap:4px;padding:5px 8px;border-bottom:1px solid var(--bd)}.ms-a button{padding:2px 8px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:10px;cursor:pointer}.rb{padding:5px 10px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:10px;cursor:pointer}.rb:hover{border-color:var(--r);color:var(--r)}.mn{padding:16px 20px}.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:16px}.kp{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;position:relative;overflow:hidden}.kp::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}.kp:nth-child(1)::after{background:var(--ac)}.kp:nth-child(2)::after{background:var(--a2)}.kp:nth-child(3)::after{background:var(--g)}.kp:nth-child(4)::after{background:var(--y)}.kp:nth-child(5)::after{background:#06b6d4}.kl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t2);margin-bottom:3px;font-weight:600}.kv{font-size:20px;font-weight:700;font-family:var(--fm);letter-spacing:-1px}.ks{font-size:10px;color:var(--t3);margin-top:2px}.cd{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:14px}.ct2{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.cw{position:relative;height:300px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}}.tw{max-height:380px;overflow-y:auto;border-radius:7px;border:1px solid var(--bd)}table{width:100%;border-collapse:collapse;font-size:11px}th{padding:8px 10px;text-align:left;background:var(--s2);color:var(--t2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}td{padding:7px 10px;border-top:1px solid var(--bd)}tr:hover td{background:rgba(37,99,235,.04)}.bg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}.br{background:rgba(239,68,68,.12);color:var(--r)}.by{background:rgba(245,158,11,.12);color:var(--y)}.bq{background:rgba(16,185,129,.12);color:var(--g)}.sc{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.sc>div{background:var(--s2);border-radius:8px;padding:11px;text-align:center}.sc .n{font-size:20px;font-weight:700;font-family:var(--fm)}.sc .l{font-size:9px;color:var(--t2);text-transform:uppercase;margin-top:2px}.tg{display:flex;gap:3px}.tg button{padding:3px 9px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:10px;cursor:pointer;font-family:var(--f)}.tg button.on{background:var(--ac);border-color:var(--ac);color:#fff}.si{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:11px;width:160px;font-family:var(--f)}.si:focus{outline:none;border-color:var(--ac)}.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}.mc{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;width:92%;max-width:900px;max-height:82vh;overflow-y:auto}.mc h3{font-size:15px;margin-bottom:12px;display:flex;justify-content:space-between}.mc .x{cursor:pointer;padding:3px 8px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:16px}.tc{display:none}.tc.on{display:block}.bs{display:flex;height:7px;border-radius:4px;overflow:hidden;margin:8px 0}.ld{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}.ld .sp{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.ld p{color:var(--t2);font-size:13px}.bw{overflow-x:auto}.bell-svg{width:100%;min-width:700px}.bc{text-align:center;padding:6px 4px;border-radius:6px}.bc h4{font-size:10px;text-transform:uppercase;margin-bottom:4px;font-weight:700}.bc p{font-size:9px;line-height:1.6;word-break:break-word}</style></head><body>
<div id="gate" style="position:fixed;inset:0;background:#05080f;z-index:999;display:flex;align-items:center;justify-content:center"><div style="text-align:center;max-width:340px;padding:32px"><div style="width:50px;height:50px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;margin:0 auto 18px">A</div><h2 style="font-family:DM Sans,sans-serif;color:#e8edf5;font-size:18px;margin-bottom:20px">Apollo Dashboard</h2><input type="password" id="gPwd" placeholder="Access code" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #1e2d4a;background:#111827;color:#e8edf5;font-size:14px;text-align:center;letter-spacing:2px;outline:none" onkeydown="if(event.key==='Enter')gAuth()"><button onclick="gAuth()" style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:13px;font-weight:600;cursor:pointer">Unlock</button><p id="gErr" style="color:#ef4444;font-size:11px;margin-top:8px"></p></div></div><script>function gAuth(){crypto.subtle.digest("SHA-256",new TextEncoder().encode(document.getElementById("gPwd").value)).then(function(h){if([].map.call(new Uint8Array(h),function(b){return b.toString(16).padStart(2,"0")}).join("")==="0382fb82daf0d57433348352b963a6f867ceca42382ebf922e959633b3578a20"){document.getElementById("gate").style.display="none";sessionStorage.setItem("a","1")}else{document.getElementById("gErr").textContent="Invalid code";document.getElementById("gPwd").value=""}})}if(sessionStorage.getItem("a")==="1")document.getElementById("gate").style.display="none";</script>
